    - main [ref=e162]:
      - heading "Kubernetes¶" [level=1] [ref=e164]:
        - text: Kubernetes
        - link "¶" [ref=e165] [cursor=pointer]:
          - /url: "#kubernetes"
      - generic [ref=e166]:
        - heading "CIS Installation¶" [level=1] [ref=e167]:
          - text: CIS Installation
          - link "¶" [ref=e168] [cursor=pointer]:
            - /url: "#cis-installation"
        - paragraph [ref=e169]: CIS can be configured for Kubernetes and OpenShift, varying by resources (ConfigMap, Ingress, Routes, CRD, serviceTypeLB), BIG-IP deployment (stand alone, HA), and cluster networking (Flannel/Calico/Cilium/Antrea/OVNKuberentes).
        - generic [ref=e170]:
          - heading "Prerequisites¶" [level=2] [ref=e171]:
            - text: Prerequisites
            - link "¶" [ref=e172] [cursor=pointer]:
              - /url: "#prerequisites"
          - generic [ref=e173]:
            - paragraph [ref=e174]: See also
            - paragraph [ref=e175]:
              - link "Installing Kubernetes with Minikube" [ref=e176] [cursor=pointer]:
                - /url: https://kubernetes.io/docs/setup/learning-environment/minikube/
              - text: .
          - paragraph [ref=e177]: "These are the mandatory requirements for deploying CIS:"
          - list [ref=e178]:
            - listitem [ref=e179]:
              - paragraph [ref=e180]: Kubernetes Cluster must be up and running.
            - listitem [ref=e181]:
              - paragraph [ref=e182]: "AS3: 3.18+ must be installed on your BIG-IP system."
            - listitem [ref=e183]:
              - paragraph [ref=e184]: Use the latest TLS version and cipher suites in Kubernetes for kube-api.
            - listitem [ref=e185]:
              - paragraph [ref=e186]: "Create a BIG-IP partition to manage Kubernetes objects. This partition can be created either via the GUI (System > Users > Partition List) or via our TMOS CLI:"
              - generic [ref=e188]:
                - generic [ref=e189]: create auth partition <cis_managed_partition>
                - button "Copy to clipboard" [ref=e190] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e191]
            - listitem [ref=e195]:
              - paragraph [ref=e196]: You need a user with administrative access to this partition.
            - listitem [ref=e197]:
              - paragraph [ref=e198]: If you need to pull the k8s-bigip-ctlr image from a private Docker registry, store your Docker login credentials as a Secret.
          - paragraph [ref=e199]:
            - text: Additionally, if you are using VXLan in Cluster Mode you need to have the following prerequisites. For more information, see
            - link "BIG-IP Networking with CIS" [ref=e200] [cursor=pointer]:
              - /url: https://clouddocs.f5.com/containers/latest/userguide/config-options.html#config-options
            - text: .
          - list [ref=e201]:
            - listitem [ref=e202]: You must have a fully active/licensed BIG-IP. SDN must be licensed. For more information, see BIG-IP VE license support for SDN services.
            - listitem [ref=e203]:
              - text: VXLan tunnel should be configured from Kubernetes Cluster to BIG-IP. For more information, see
              - link "Creating VXLAN Tunnels on Kubernetes Cluster" [ref=e204] [cursor=pointer]:
                - /url: "#Creating-VXLAN-Tunnels-on-Kubernetes-Cluster"
              - text: .
          - paragraph [ref=e205]:
            - text: Also consider
            - link "BIG-IP Networking with CIS" [ref=e206] [cursor=pointer]:
              - /url: https://clouddocs.f5.com/containers/latest/userguide/config-options.html#config-options
            - text: .
          - paragraph [ref=e207]:
            - text: For BIG-IP HA, see
            - link "Deploying CIS with BIG-IP HA" [ref=e208] [cursor=pointer]:
              - /url: https://clouddocs.f5.com/containers/latest/userguide/cis-deployment-options.html
        - generic [ref=e209]:
          - heading "Installing CIS Using Helm Charts¶" [level=2] [ref=e210]:
            - text: Installing CIS Using Helm Charts
            - link "¶" [ref=e211] [cursor=pointer]:
              - /url: "#installing-cis-using-helm-charts"
          - generic [ref=e212]:
            - paragraph [ref=e213]: See also
            - paragraph [ref=e214]:
              - link "Introduction to Helm" [ref=e215] [cursor=pointer]:
                - /url: https://helm.sh/docs/intro/
              - text: .
          - paragraph [ref=e216]: This is the simplest way to install CIS on OpenShift/Kubernetes cluster. Helm is a package manager for Kubernetes. Helm is Kubernetes version of yum or apt. Helm deploys something called charts, which you can think of as a packaged application. It is a collection of all your versioned, pre-configured application resources which can be deployed as one unit.
          - list [ref=e217]:
            - listitem [ref=e218]:
              - paragraph [ref=e219]: Clone the GitHub repository
              - generic [ref=e221]:
                - generic [ref=e222]: git clone https://github.com/F5Networks/k8s-bigip-ctlr.git
                - button "Copy to clipboard" [ref=e223] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e224]
            - listitem [ref=e228]:
              - paragraph [ref=e229]: Download the CA/BIG IP certificate and use it with CIS controller.
              - generic [ref=e231]:
                - generic [ref=e232]: echo | openssl s_client -showcerts -servername <server-hostname> -connect <server-ip-address>:<server-port> 2>/dev/null | openssl x509 -outform PEM > server_cert.pem kubectl create configmap trusted-certs --from-file=./server_cert.pem -n kube-system
                - button "Copy to clipboard" [ref=e233] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e234]
          - paragraph [ref=e238]:
            - text: Alternatively, for non-prod environment you can use
            - code [ref=e239]: "--insecure=true"
            - text: parameter.
          - paragraph [ref=e240]:
            - strong [ref=e241]: Note:-
            - text: If you are updating the BIGIP/CA Certificates, don’t miss to rotate them on k8s cluster and restart the CIS.
          - list [ref=e242]:
            - listitem [ref=e243]:
              - paragraph [ref=e244]: Add BIG-IP credentials as K8S secrets.
              - generic [ref=e246]:
                - generic [ref=e247]: kubectl create secret generic f5-bigip-ctlr-login -n kube-system --from-literal=username=admin --from-literal=password=<password> --from-literal=url=<bigip-uri>
                - button "Copy to clipboard" [ref=e248] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e249]
            - listitem [ref=e253]:
              - paragraph [ref=e254]: "Add the CIS chart repository in Helm using following command:"
              - generic [ref=e256]:
                - generic [ref=e257]: helm repo add f5-stable https://f5networks.github.io/charts/stable
                - button "Copy to clipboard" [ref=e258] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e259]
            - listitem [ref=e263]:
              - paragraph [ref=e264]:
                - text: Update the
                - code [ref=e265]: sample-helm-values.yaml
              - generic [ref=e267]:
                - generic [ref=e268]: ./docs/config_examples/Install/k8s/sample-helm-values.yaml
                - button "Copy to clipboard" [ref=e269] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e270]
            - listitem [ref=e274]:
              - paragraph [ref=e275]: "Installing Helm charts:"
          - blockquote [ref=e276]:
            - generic [ref=e277]:
              - list [ref=e278]:
                - listitem [ref=e279]: "Install the Helm chart using the following command if BIG-IP credential secrets are created manually:"
              - generic [ref=e281]:
                - generic [ref=e282]: helm install -f values.yaml <new-chart-name> f5-stable/f5-bigip-ctlr
                - button "Copy to clipboard" [ref=e283] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e284]
              - list [ref=e288]:
                - listitem [ref=e289]: "Install the Helm chart with –skip crds if BIG-IP credential secrets are created manually (without Custom Resource Definitions installations):"
              - generic [ref=e291]:
                - generic [ref=e292]: helm install --skip-crds -f values.yaml <new-chart-name> f5-stable/f5-bigip-ctlr
                - button "Copy to clipboard" [ref=e293] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e294]
              - list [ref=e298]:
                - listitem [ref=e299]: "If you want to create the BIG-IP credential secret with Helm charts, use the following command:"
              - generic [ref=e301]:
                - generic [ref=e302]: helm install --set bigip_secret.create="true" --set bigip_secret.username=$BIGIP_USERNAME --set bigip_secret.password=$BIGIP_PASSWORD -f values.yaml <new-chart-name> f5-stable/f5-bigip-ctlr
                - button "Copy to clipboard" [ref=e303] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e304]
          - paragraph [ref=e308]:
            - strong [ref=e309]: "Note:"
            - text: "For Kubernetes versions lower than 1.18, please use Helm chart version 0.0.14 as follows: helm install –skip-crds -f values.yaml f5-stable/f5-bigip-ctlr –version 0.0.14."
