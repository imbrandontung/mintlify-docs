              - link "¶" [ref=e3383] [cursor=pointer]:
                - /url: "#id377"
            - list [ref=e3384]:
              - listitem [ref=e3385]:
                - text: CIS will not create _AS3 partition anymore.
                - list [ref=e3386]:
                  - listitem [ref=e3387]: CIS uses single partition (i.e. –bigip-partition) to configure both LTM and NET configuration.
                  - listitem [ref=e3388]: Additional AS3 managed partition _AS3 will be removed if it exists.
              - listitem [ref=e3389]: Enhanced performance for lower CPU Utilization with optimized CCCL calls.
              - listitem [ref=e3390]: CIS validates AS3 declarations against AS3 v3.20 schema.
              - listitem [ref=e3391]: CIS supports AS3 versions installed on BIG-IP from v3.18 to latest (v3.20).
              - listitem [ref=e3392]:
                - text: "Added support for:"
                - list [ref=e3393]:
                  - listitem [ref=e3394]: Multiple AS3 ConfigMaps.
                  - listitem [ref=e3395]:
                    - text: "AS3 label switching in AS3 ConfigMap resource:"
                    - list [ref=e3396]:
                      - listitem [ref=e3397]: When set to False, CIS deletes the existing configuration (or) CIS ignores AS3 ConfigMap.
                      - listitem [ref=e3398]: When set to True, CIS reads the corresponding AS3 ConfigMap.
                  - listitem [ref=e3399]:
                    - text: Added Whitelist feature support for agent AS3 using policy endpoint condition.
                    - list [ref=e3400]:
                      - listitem [ref=e3401]: New annotation “allow-source-range” added parallel to “whitelist-source-range”.
              - listitem [ref=e3402]: Deprecated –userdefined-as3-declaration CIS deployment option as CIS now supports Multiple AS3 ConfigMaps.
              - listitem [ref=e3403]:
                - text: Custom Resource Definition (CRD) – Alpha available with TLS support.
                - list [ref=e3404]:
                  - listitem [ref=e3405]:
                    - text: "Highlights of this Alpha CRD version:"
                    - list [ref=e3406]:
                      - listitem [ref=e3407]: Supports single partition to configure both LTM and NET configuration.
                      - listitem [ref=e3408]: Supports both unsecured and TLS CRD.
                      - listitem [ref=e3409]: Supports single domain per Virtual server.
                      - listitem [ref=e3410]: Supports merging multiple virtual servers into single BIG-IP VIP referring to a single domain.
                      - listitem [ref=e3411]: Added Health monitor support.
                      - listitem [ref=e3412]: Supports nodelabel in Virtual server CRD.
                      - listitem [ref=e3413]: Supports TLSProfile CRD with BIG-IP reference client and server SSL profiles.
                      - listitem [ref=e3414]: Supports TLSProfile CRD with K8S secrets reference for client SSL profiles.
                      - listitem [ref=e3415]:
                        - link "CRD schema definition for both Virtual server and TLSProfile" [ref=e3416] [cursor=pointer]:
                          - /url: https://github.com/F5Networks/k8s-bigip-ctlr/tree/master/docs/config_examples/customResource/Install/customresourcedefinitions.yml
                        - text: .
                      - listitem [ref=e3417]:
                        - link "CRD examples" [ref=e3418] [cursor=pointer]:
                          - /url: https://github.com/F5Networks/k8s-bigip-ctlr/tree/master/docs/config_examples/customResource/CustomResource.md
                        - text: .
              - listitem [ref=e3419]:
                - text: "The following GitHub repositories have been archived are now read-only. These projects are no longer actively maintained:"
                - list [ref=e3420]:
                  - listitem [ref=e3421]:
                    - link "https://github.com/F5Networks/cf-bigip-ctlr" [ref=e3422] [cursor=pointer]:
                      - /url: https://github.com/F5Networks/cf-bigip-ctlr
                  - listitem [ref=e3423]:
                    - link "https://github.com/F5Networks/marathon-bigip-ctlr" [ref=e3424] [cursor=pointer]:
                      - /url: https://github.com/F5Networks/marathon-bigip-ctlr
