      - generic [ref=e79]:
        - heading "Patch Releases" [level=1] [ref=e80]
        - paragraph [ref=e81]: Schedule and team contact information for Kubernetes patch releases.
        - paragraph [ref=e82]:
          - text: For general information about Kubernetes release cycle, see the
          - link "release process description" [ref=e83] [cursor=pointer]:
            - /url: /releases/release/
          - text: .
        - heading "Cadence" [level=2] [ref=e84]
        - paragraph [ref=e85]: Our typical patch release cadence is monthly. It is commonly a bit faster (1 to 2 weeks) for the earliest patch releases after a 1.X minor release. Critical bug fixes may cause a more immediate release outside of the normal cadence. We also aim to not make releases during major holiday periods.
        - heading "Contact" [level=2] [ref=e86]
        - paragraph [ref=e87]:
          - text: See the
          - link "Release Managers page" [ref=e88] [cursor=pointer]:
            - /url: /releases/release-managers/
          - text: for full contact details on the Patch Release Team.
        - paragraph [ref=e89]: Please give us a business day to respond - we may be in a different timezone!
        - paragraph [ref=e90]:
          - text: In between releases the team is looking at incoming cherry pick requests on a weekly basis. The team will get in touch with submitters via GitHub PR, SIG channels in Slack, and direct messages in Slack and
          - link "email" [ref=e91] [cursor=pointer]:
            - /url: mailto:release-managers-private@kubernetes.io
          - text: if there are questions on the PR.
        - heading "Cherry picks" [level=2] [ref=e92]
        - paragraph [ref=e93]:
          - text: Please follow the
          - link "cherry pick process" [ref=e94] [cursor=pointer]:
            - /url: https://github.com/kubernetes/community/blob/main/contributors/devel/sig-release/cherry-picks.md
          - text: .
        - paragraph [ref=e95]:
          - text: Cherry picks must be merge-ready in GitHub with proper labels (e.g.,
          - code [ref=e96]: approved
          - text: ","
          - code [ref=e97]: lgtm
          - text: ","
          - code [ref=e98]: release-note
          - text: ) and passing CI tests ahead of the cherry pick deadline. This is typically two days before the target release, but may be more. Earlier PR readiness is better, as we need time to get CI signal after merging your cherry picks ahead of the actual release.
        - paragraph [ref=e99]: Cherry pick PRs which miss merge criteria will be carried over and tracked for the next patch release.
        - heading "Support Period" [level=2] [ref=e100]
        - paragraph [ref=e101]:
          - text: In accordance with the
          - link "yearly support KEP" [ref=e102] [cursor=pointer]:
            - /url: https://git.k8s.io/enhancements/keps/sig-release/1498-kubernetes-yearly-support-period/README.md
          - text: ", the Kubernetes Community will support active patch release series for a period of roughly fourteen (14) months."
        - paragraph [ref=e103]: The first twelve months of this timeframe will be considered the standard period.
        - paragraph [ref=e104]: "Towards the end of the twelve month, the following will happen:"
        - list [ref=e105]:
          - listitem [ref=e106]:
            - link "Release Managers" [ref=e107] [cursor=pointer]:
              - /url: /releases/release-managers/
            - text: will cut a release
          - listitem [ref=e108]: The patch release series will enter maintenance mode
        - paragraph [ref=e109]: "During the two-month maintenance mode period, Release Managers may cut additional maintenance releases to resolve:"
        - list [ref=e110]:
          - listitem [ref=e111]:
            - link "Vulnerabilities" [ref=e112] [cursor=pointer]:
              - /url: /docs/reference/issues-security/official-cve-feed/
            - text: that have an assigned CVE ID (under the advisement of the Security Response Committee)
          - listitem [ref=e113]: dependency issues (including base image updates)
          - listitem [ref=e114]: critical core component issues
        - paragraph [ref=e115]: At the end of the two-month maintenance mode period, the patch release series will be considered EOL (end of life) and cherry picks to the associated branch are to be closed soon afterwards.
        - paragraph [ref=e116]: Note that the 28th of the month was chosen for maintenance mode and EOL target dates for simplicity (every month has it).
        - heading "Upcoming Monthly Releases" [level=2] [ref=e117]
        - paragraph [ref=e118]: Timelines may vary with the severity of bug fixes, but for easier planning we will target the following monthly release points. Unplanned, critical releases may also occur in between these.
